<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeMesh</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>OfficeMesh</h1>
        <span class="status-indicator" id="status-indicator"></span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main content area - views switch here -->
    <main class="main">
      
      <!-- Peers List View -->
      <section class="view" id="peers-view">
        <div class="view-header">
          <h2>Peers</h2>
          <div class="view-actions">
            <button class="btn btn-sm" id="quick-scan-btn" title="Quick scan known peers">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
              Quick
            </button>
            <button class="btn btn-sm btn-primary" id="full-scan-btn" title="Full subnet scan">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              Scan
            </button>
          </div>
        </div>

        <!-- Scan progress -->
        <div class="scan-progress hidden" id="scan-progress">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-text" id="progress-text">Scanning...</span>
        </div>

        <!-- Peers list -->
        <div class="peers-list" id="peers-list">
          <div class="empty-state" id="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <p>No peers found</p>
            <span>Click "Scan" to discover peers on your network</span>
          </div>
        </div>
      </section>

      <!-- Chat View -->
      <section class="view hidden" id="chat-view">
        <div class="chat-header">
          <button class="icon-btn" id="back-btn" title="Back to peers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <div class="chat-peer-info">
            <span class="chat-peer-name" id="chat-peer-name">Peer Name</span>
            <span class="chat-peer-status" id="chat-peer-status">Connecting...</span>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Messages rendered here -->
        </div>

        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
          <button class="btn btn-primary" id="send-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </section>

      <!-- Settings View -->
      <section class="view hidden" id="settings-view">
        <div class="view-header">
          <button class="icon-btn" id="settings-back-btn" title="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <h2>Settings</h2>
        </div>

        <div class="settings-content">
          <div class="setting-group">
            <label for="display-name">Your Display Name</label>
            <input type="text" id="display-name" placeholder="Anonymous" maxlength="50">
            <span class="setting-hint">How you appear to other peers</span>
          </div>

          <div class="setting-group">
            <label for="subnet-input">Network Subnet</label>
            <div class="subnet-input-wrapper">
              <input type="text" id="subnet-input" placeholder="192.168.1" pattern="^\d{1,3}\.\d{1,3}\.\d{1,3}$">
              <span class="subnet-suffix">.1-255</span>
            </div>
            <span class="setting-hint">First 3 octets of your LAN (e.g., 192.168.1)</span>
          </div>

          <div class="setting-group">
            <label for="auto-scan-interval">Auto-scan Interval</label>
            <select id="auto-scan-interval">
              <option value="0">Disabled</option>
              <option value="15">Every 15 minutes</option>
              <option value="30" selected>Every 30 minutes</option>
              <option value="60">Every hour</option>
            </select>
            <span class="setting-hint">How often to scan for new peers</span>
          </div>

          <div class="setting-group">
            <label>Your Device ID</label>
            <div class="device-id" id="device-id">Loading...</div>
            <span class="setting-hint">Unique identifier for your device</span>
          </div>

          <button class="btn btn-primary btn-full" id="save-settings-btn">Save Settings</button>
        </div>
      </section>

    </main>
  </div>

  <!-- Socket.IO for WebRTC signaling (loaded from local copy to satisfy MV3 CSP) -->
  <script src="../lib/socket.io.min.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
