appId: com.officemesh.desktop
productName: OfficeMesh
copyright: Copyright © 2026

directories:
  output: dist/

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

extraResources:
  - from: ../server/
    to: server/
    filter:
      - "**/*"

files:
  - main/**
  - renderer/**
  - assets/**
  - package.json
