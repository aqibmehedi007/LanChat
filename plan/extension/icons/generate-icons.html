<!DOCTYPE html>
<html>
<head>
  <title>OfficeMesh Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1e293b; color: white; }
    .icon-container { display: flex; gap: 20px; margin: 20px 0; }
    canvas { border: 1px solid #334155; }
    button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2563eb; }
    a { color: #3b82f6; }
  </style>
</head>
<body>
  <h1>OfficeMesh Icon Generator</h1>
  <p>Click "Generate" to create PNG icons, then right-click each canvas and "Save image as..." to save them.</p>
  
  <button onclick="generateIcons()">Generate Icons</button>
  
  <div class="icon-container">
    <div>
      <h3>16x16</h3>
      <canvas id="icon16" width="16" height="16"></canvas>
    </div>
    <div>
      <h3>48x48</h3>
      <canvas id="icon48" width="48" height="48"></canvas>
    </div>
    <div>
      <h3>128x128</h3>
      <canvas id="icon128" width="128" height="128"></canvas>
    </div>
  </div>

  <div id="download-links"></div>

  <script>
    function drawIcon(ctx, size) {
      const scale = size / 128;
      
      // Background
      ctx.fillStyle = '#3b82f6';
      roundRect(ctx, 0, 0, size, size, 20 * scale);
      ctx.fill();
      
      // Nodes (mesh network visualization)
      ctx.fillStyle = 'white';
      const nodeRadius = 14 * scale;
      
      // Top left node
      ctx.beginPath();
      ctx.arc(38 * scale, 48 * scale, nodeRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Top right node
      ctx.beginPath();
      ctx.arc(90 * scale, 48 * scale, nodeRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Bottom node
      ctx.beginPath();
      ctx.arc(64 * scale, 92 * scale, nodeRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Connections
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = 'round';
      
      // Top connection
      ctx.beginPath();
      ctx.moveTo(38 * scale, 48 * scale);
      ctx.lineTo(90 * scale, 48 * scale);
      ctx.stroke();
      
      // Left diagonal
      ctx.beginPath();
      ctx.moveTo(38 * scale, 48 * scale);
      ctx.lineTo(64 * scale, 92 * scale);
      ctx.stroke();
      
      // Right diagonal
      ctx.beginPath();
      ctx.moveTo(90 * scale, 48 * scale);
      ctx.lineTo(64 * scale, 92 * scale);
      ctx.stroke();
    }
    
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }
    
    function generateIcons() {
      const sizes = [16, 48, 128];
      const linksDiv = document.getElementById('download-links');
      linksDiv.innerHTML = '<h3>Download Links:</h3>';
      
      sizes.forEach(size => {
        const canvas = document.getElementById(`icon${size}`);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        drawIcon(ctx, size);
        
        // Create download link
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = `icon${size}.png`;
        link.textContent = `Download icon${size}.png`;
        link.style.display = 'block';
        link.style.marginBottom = '10px';
        linksDiv.appendChild(link);
      });
    }
    
    // Generate on load
    window.onload = generateIcons;
  </script>
</body>
</html>
